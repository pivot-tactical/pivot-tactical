name: Build PIVOT bundle
description: >-
  Build the frontend and the PyInstaller bundle for the current OS, then upload
  it (plus its SHA-256) as a workflow artifact. Shared by the per-OS prerelease
  build jobs so they can have clean static names instead of a matrix.

inputs:
  artifact:
    description: Platform tag for the artifact name (e.g. win64, linux-x86_64).
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Compute prerelease version
      shell: bash
      run: |
        base=$(python -c "import re,pathlib;print(re.search(r'__version__ = \"([^\"]+)\"', pathlib.Path('server/pivot/version.py').read_text()).group(1))")
        echo "PIVOT_VERSION=${base}-dev.${{ github.run_number }}" >> "$GITHUB_ENV"

    # Generate _buildinfo BEFORE installing the package, so the version is baked
    # into the source that gets installed/bundled (else the app reports the base
    # version and the prerelease update channel sees no updates).
    - name: Embed build info (prerelease version)
      shell: bash
      run: PIVOT_BUILD_VERSION="$PIVOT_VERSION" python packaging/gen_buildinfo.py

    - uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Build frontend
      shell: bash
      working-directory: frontend
      run: npm ci && npm run build

    - name: Install build dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r server/requirements.txt
        pip install pyinstaller
        pip install ./server --no-deps

    - name: Build with PyInstaller
      shell: bash
      run: pyinstaller --noconfirm packaging/pivot.spec

    # Version-agnostic asset names so the download URL is stable across releases
    # (the version lives in the tag, the release notes and the embedded
    # build-info). releases/latest/download/PIVOT-Tactical-win64.zip always
    # resolves to the newest build.
    - name: Package (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $archive = "PIVOT-Tactical-win64.zip"
        Compress-Archive -Path dist/PIVOT-Tactical -DestinationPath $archive
        $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
        "$hash  $archive" | Out-File "$archive.sha256" -Encoding ascii -NoNewline

    - name: Package (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        archive="PIVOT-Tactical-linux-x86_64.tar.gz"
        tar -czf "$archive" -C dist PIVOT-Tactical
        sha256sum "$archive" > "$archive.sha256"

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: prerelease-${{ inputs.artifact }}
        path: |
          PIVOT-Tactical-*.zip
          PIVOT-Tactical-*.tar.gz
          PIVOT-Tactical-*.sha256
        if-no-files-found: error
