name: Release

# Builds the distributable bundles and publishes them to GitHub Releases when a
# version tag (vX.Y.Z) is pushed. The in-app updater consumes exactly these
# assets: a per-platform archive plus its SHA-256 sidecar, verified before any
# staged swap (spec §3.7.5). Run manually via "Run workflow" to validate a build
# without cutting a release (artifacts are uploaded, nothing is published).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # publish release assets

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 only. Linux is built on an older LTS to keep the glibc floor
          # low so it runs on common distros (Ubuntu 22.04+, Debian 12+, …).
          - os: windows-latest
            artifact: win64
          - os: ubuntu-22.04
            artifact: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Identical build to the prereleases: same shared action, so a stable
      # release and a dev prerelease are byte-for-byte the same in form and
      # update through the same verified, channel-aware staged path.
      - name: Version from tag
        shell: bash
        run: |
          ver="${{ github.ref_name }}"
          if [[ "$ver" =~ ^v[0-9] ]]; then ver="${ver#v}"; else ver="0.0.0-dev"; fi
          echo "REL_VERSION=$ver" >> "$GITHUB_ENV"

      - uses: ./.github/actions/build-pivot
        with:
          artifact: ${{ matrix.artifact }}
          version: ${{ env.REL_VERSION }}
          eddsa_private_key: ${{ secrets.PIVOT_EDDSA_PRIVATE_KEY }}
          windows_certificate: ${{ secrets.WINDOWS_CERTIFICATE }}
          windows_certificate_password: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      # --- publish to the GitHub Release on a tag ---
      # The shared action leaves the assets in the workspace. Version-agnostic
      # names give a stable releases/latest/download URL; each archive ships its
      # .sha256 (integrity) and .sig (Ed25519 authenticity) which the in-app
      # updater verifies before staging.
      - name: Publish to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PIVOT-Tactical-win64.zip
            PIVOT-Tactical-linux-x86_64.tar.gz
            PIVOT-Tactical-*.sha256
            PIVOT-Tactical-*.sig
            PIVOT-Tactical-Setup.exe
          fail_on_unmatched_files: false
          generate_release_notes: true

  # Bumps __version__ (and friends) on `main` to the next patch the moment a
  # stable tag ships, so development immediately starts targeting the right
  # version — the prerelease counter in ci.yml trusts each branch's own
  # __version__ (concurrent branches may legitimately target different next
  # versions), so this is what keeps that source of truth from going stale and
  # producing surprises like a dev build still numbered off the version that
  # just shipped (v1.0.0-dev.71 instead of v1.0.1-dev.1).
  #
  # Patch-only: a release that bumps minor/major is a deliberate decision the
  # author makes by hand on `main` (this would otherwise guess wrong).
  bump-version:
    name: Bump development version
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Compute next patch version
        id: next
        run: |
          ver="${{ github.ref_name }}"
          ver="${ver#v}"
          IFS='.' read -r major minor patch <<< "$ver"
          echo "next=${major}.${minor}.$((patch + 1))" >> "$GITHUB_OUTPUT"

      - name: Bump version files
        run: |
          next="${{ steps.next.outputs.next }}"
          sed -i "s/^__version__ = \".*\"/__version__ = \"$next\"/" server/pivot/version.py
          sed -i "s/^version = \".*\"/version = \"$next\"/" server/pyproject.toml
          (cd frontend && npm version "$next" --no-git-tag-version --allow-same-version)

      - name: Commit and push to main
        run: |
          next="${{ steps.next.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server/pivot/version.py server/pyproject.toml frontend/package.json frontend/package-lock.json
          if git diff --cached --quiet; then
            echo "Already at $next — nothing to bump."
            exit 0
          fi
          git commit -m "Bump development version to $next [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git fetch origin main
            git rebase origin/main
            sleep $((attempt * 3))
          done
          echo "::error::failed to push version bump to main after retries"
          exit 1
