name: CI

# Single pipeline so the prerelease build can depend on CI via `needs` (job
# dependencies only work within one workflow). Order of operations on a PR:
#   backend (licence → lint → tests) + frontend  ──►  prerelease build ──► publish
# The prerelease jobs only start once CI has passed, so a broken commit never
# produces a published build.
#
# `push` is limited to main to avoid the duplicate run you get when a PR-branch
# push fires both `push` and `pull_request` for the same commit.
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

# Cancel an in-progress run (CI *and* its prerelease build) when a newer commit
# supersedes it — only the latest commit on a branch is built.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests & licence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (base runtime deps + test tools)
        run: |
          python -m pip install --upgrade pip
          # Base deps are all permissive/testable; native extras (aiortc,
          # faster-whisper) are intentionally NOT installed here.
          pip install -e ./server
          pip install pytest pytest-asyncio httpx ruff

      # Licence gate runs FIRST so a compliance problem fails fast, before we
      # spend time linting and testing (spec §13.7).
      - name: Licence policy scan (spec §13.7)
        working-directory: server
        # Fails the build on any GPL/AGPL strong-copyleft runtime dependency.
        run: python -m pivot.tools.licenses --check

      - name: Lint
        run: ruff check server/pivot

      - name: Run tests
        working-directory: server
        run: python -m pytest -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install & build
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Frontend licence summary (spec §13.7)
        working-directory: frontend
        env:
          npm_config_loglevel: error # silence license-checker's own npm deprecation chatter
        # --excludePrivatePackages drops our own (private, unpublished) package,
        # which license-checker would otherwise label "UNLICENSED". Informational
        # summary; the enforced denylist gate is the Python scan in the backend job.
        run: npx --yes license-checker --production --summary --excludePrivatePackages || true

  # A prerelease is built only when a commit actually changes the app or its
  # build. This is an ALLOWLIST: it ignores test files, CI/workflows, agentic
  # tool logs (.claude/**), docs, LICENSE/NOTICE — anything that doesn't change
  # what gets shipped.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        shell: bash
        run: |
          # Diff only the commits added by THIS push (synchronize provides
          # before/after), so a doc/test/workflow-only commit skips the build
          # even on a PR that contains app changes elsewhere. Fall back to the
          # whole-PR diff on opened/reopened or if `before` is unavailable.
          zero=0000000000000000000000000000000000000000
          before="${{ github.event.before }}"
          after="${{ github.event.pull_request.head.sha }}"
          if [ -z "$before" ] || [ "$before" = "$zero" ] || ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            before="${{ github.event.pull_request.base.sha }}"
          fi
          if [ -z "$before" ] || [ -z "$after" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Paths that affect the shipped application or how it is built.
          # NB: server/pivot/** is app code; server/tests/** is intentionally
          # excluded, as are .github/**, .claude/**, *.md, etc.
          allow='^(server/pivot/|server/requirements\.txt$|server/pyproject\.toml$|frontend/src/|frontend/index\.html$|frontend/package(-lock)?\.json$|frontend/vite\.config\.ts$|frontend/tsconfig|packaging/)'
          changed=$(git diff --name-only "$before" "$after" 2>/dev/null || true)
          echo "Changed files in this push:" >&2; echo "$changed" >&2
          if echo "$changed" | grep -qE "$allow"; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false (no app/build files changed in this push)" >&2
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  # ---- Prerelease: only after CI passes, only on same-repo PRs with code ----
  # Two explicitly-named jobs (not a matrix) so the check labels stay clean even
  # when skipped. The build steps live in a shared composite action to avoid
  # duplication.
  prerelease-build-windows:
    name: Prerelease build (Windows)
    needs: [backend, frontend, changes]
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.changes.outputs.code == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-pivot
        with:
          artifact: win64

  prerelease-build-linux:
    name: Prerelease build (Linux)
    needs: [backend, frontend, changes]
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.changes.outputs.code == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-pivot
        with:
          artifact: linux-x86_64

  prerelease-publish:
    name: Prerelease publish
    needs: [prerelease-build-windows, prerelease-build-linux]
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write # publish prerelease + tags
      pull-requests: write # post the version↔commit comment
      issues: write # delete the previous prerelease comment before reposting
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute prerelease version
        shell: bash
        run: |
          base=$(python -c "import re,pathlib;print(re.search(r'__version__ = \"([^\"]+)\"', pathlib.Path('server/pivot/version.py').read_text()).group(1))")
          echo "PIVOT_VERSION=${base}-dev.${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Collect artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.PIVOT_VERSION }}
          name: PIVOT v${{ env.PIVOT_VERSION }} (prerelease)
          prerelease: true
          target_commitish: ${{ github.event.pull_request.head.sha }}
          files: dist-artifacts/PIVOT-Tactical-*
          fail_on_unmatched_files: true

      - name: Comment version ↔ commit on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const version = process.env.PIVOT_VERSION;
            const tag = `v${version}`;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const url = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`;
            const when = new Date().toISOString().replace('T', ' ').substring(0, 16) + ' UTC';
            const marker = '<!-- pivot-prerelease -->';
            const row = `| \`${tag}\` | \`${sha}\` | [download](${url}) | ${when} |`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            // Carry the recent history forward (newest first, keep last 8).
            let rows = existing ? existing.body.split('\n').filter((l) => l.startsWith('| `v')) : [];
            rows = [row, ...rows].slice(0, 8);
            const body = [
              marker,
              '### 🤖 Prerelease build ready',
              `Latest: **${tag}** (\`${sha}\`) — [download](${url}). In **Settings → Updates** choose *Include prereleases*.`,
              '',
              '| Version | Commit | Download | Built |',
              '|---|---|---|---|',
              ...rows,
            ].join('\n');
            // Delete the previous comment and post a fresh one so each build
            // re-surfaces at the bottom of the thread and sends a notification —
            // GitHub does not notify or bump a comment on an in-place edit.
            if (existing) {
              await github.rest.issues.deleteComment({ ...context.repo, comment_id: existing.id });
            }
            await github.rest.issues.createComment({
              ...context.repo, issue_number: context.issue.number, body,
            });

      - name: Prune old dev prereleases (keep newest 10)
        uses: actions/github-script@v7
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({ ...context.repo, per_page: 100 });
            const dev = releases
              .filter((r) => r.prerelease && r.tag_name.includes('-dev.'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            for (const r of dev.slice(10)) {
              await github.rest.repos.deleteRelease({ ...context.repo, release_id: r.id });
              try {
                await github.rest.git.deleteRef({ ...context.repo, ref: `tags/${r.tag_name}` });
              } catch (e) { /* tag already gone */ }
            }
