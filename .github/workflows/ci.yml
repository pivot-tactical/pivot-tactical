name: CI

# Run on PRs, and on direct pushes to main. Limiting `push` to main avoids the
# duplicate run you get when a push to a PR branch fires BOTH `push` and
# `pull_request` for the same commit — feature branches are covered by the PR.
on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run when a newer commit supersedes it (saves minutes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests + licence scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (base runtime deps + test tools)
        run: |
          python -m pip install --upgrade pip
          # Base deps are all permissive/testable; native extras (aiortc,
          # faster-whisper, PySide6) are intentionally NOT installed here.
          pip install -e ./server
          pip install pytest pytest-asyncio httpx ruff

      - name: Lint
        run: ruff check server/pivot

      - name: Run tests
        working-directory: server
        run: python -m pytest -q

      - name: Licence policy scan (spec §13.7)
        working-directory: server
        # Fails the build on any GPL/AGPL strong-copyleft runtime dependency.
        run: python -m pivot.tools.licenses --check

  frontend:
    name: Frontend build + licence summary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install & build
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Frontend licence summary (spec §13.7)
        working-directory: frontend
        env:
          npm_config_loglevel: error # silence license-checker's own npm deprecation chatter
        # --excludePrivatePackages drops our own (private, unpublished) package,
        # which license-checker would otherwise label "UNLICENSED". Informational
        # summary; the enforced denylist gate is the Python scan in the backend job.
        run: npx --yes license-checker --production --summary --excludePrivatePackages || true
